            indicator:
              arc_opa: TRANSP
            knob:
              bg_opa: TRANSP
        # ── TIMER COVER (the user's design) ────────────────────────────────────────────────
        # A near-black arc drawn ON TOP of the 12 forecast segments. It spans the REMAINING
        # fraction anchored at 12 o'clock, so as the timer counts down the cover peels back
        # clockwise and REVEALS the forecast colour that was always underneath.
        #
        # Chosen over hide-the-forecast-and-restore-it, and over storing/swapping per-segment
        # colours: this touches the forecast arcs NEVER. No stored state, nothing to restore,
        # no exit path that can leave the ring wrong — hide the cover and what's beneath is
        # already correct. It's also smooth (1s ticks = 0.4°/s on a 15min timer) instead of
        # 12 chunky segment steps.
        - arc:
            id: timer_cover
            align: CENTER
            width: 356
            height: 356
            arc_rounded: false
            start_angle: 270
            end_angle: 269
            arc_width: 13
            arc_color: 0x23282F
            adjustable: false
            value: 0
            hidden: true
            indicator:
              arc_opa: TRANSP
            knob:
              bg_opa: TRANSP
        # ── NOW tick: fixed marker just outside segment 0 ──
            border_width: 0
        # ── per-hour precip glyphs, in the annulus freed by centring the clock ──
        - label:
            id: px_00
            text: ""
            text_font: mdi_precip
            align: CENTER
            x: 0
            y: -152
            text_color: 0x7FD4FF
        - label:
            id: px_01
            text: ""
            text_font: mdi_precip
            align: CENTER
            x: 76
            y: -132
            text_color: 0x7FD4FF
        - label:
            id: px_02
            text: ""
            text_font: mdi_precip
            align: CENTER
            x: 132
            y: -76
            text_color: 0x7FD4FF
        - label:
            id: px_03
            text: ""
