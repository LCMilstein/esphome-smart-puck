            text_color: 0x7FD4FF
        - label:
            id: px_09
            text: ""
            text_font: mdi_precip
            align: CENTER
            x: -152
            y: 0
            text_color: 0x7FD4FF
        - label:
            id: px_10
            text: ""
            text_font: mdi_precip
            align: CENTER
            x: -132
            y: -76
            text_color: 0x7FD4FF
        - label:
            id: px_11
            text: ""
            text_font: mdi_precip
            align: CENTER
            x: -76
            y: -132
            text_color: 0x7FD4FF
        # ── outdoor NOW: condition glyph + temperature, sitting under segment 0 ──
        - label:
            id: weather_icon
            text: "\U000F0590"
            text_font: mdi_28
            align: CENTER
            y: -118
            text_color: 0xFFFFFF
        - label:
            id: temp_out_text
            text: "--°"
            text_font: roboto_temp
            align: CENTER
            y: -80
            text_color: 0xFFFFFF
        # 12h low. Replaces the min/max labels that used to sit ON the ring — three similar-sized
        # temperatures competing for the same glance was the worst part of the old design.
        - label:
            id: low_label
            text: ""
            text_font: roboto_tiny
            align: CENTER
            y: -52
            text_color: 0x8FC8F5
        # ── timer readout: occupies the outdoor-temp slot while a timer runs. A countdown is
        #    urgent and temporary; the temperature is neither. The CLOCK keeps the centre —
        #    this is a clock first, and a timer shouldn't rearrange its identity for 15 minutes.
        - label:
            id: timer_label
            text: "TIMER"
            text_font: roboto_tiny
            align: CENTER
            y: -110
            text_color: 0x7FE9FF
            hidden: true
        - label:
            id: timer_value
            text: ""
            text_font: roboto_time
            align: CENTER
            y: -76
            text_color: 0xFFFFFF
            hidden: true
        # ── clock + date: DEAD CENTRE. This is what frees the whole annulus for the ring. ──
        - label:
            id: time_label
            text: "--:--"
            text_font: roboto_time
            align: CENTER
            y: -6
            text_color: 0xFFFFFF
        - label:
            id: date_label
            text: "--"
            text_font: roboto_small
            align: CENTER
            y: 32
            text_color: 0xE4EAF4
        # ── music: PRESENCE ONLY. Song title lives one tap away on the media page; at 13px it was
        #    unreadable from across the room anyway. Hidden when nothing is playing.
        - label:
            id: np_note
            text: "\U000F075A"
            text_font: mdi_note
            align: CENTER
            y: 72
            text_color: 0xBFD5EC
            hidden: true
        # package badge — same presence-only contract as the note: the OPEN BOX means "a package
        # is waiting", absence means none. Driven by input_boolean.package_waiting (Frigate's
        # stock COCO model can't see packages; Frigate+ or any delivery integration flips the
        # boolean later — the display side doesn't care who).
        - label:
            id: pkg_note
            text: "\U000F03D6"
            text_font: mdi_note
            align: CENTER
            y: 72
            text_color: 0xF2D544
            hidden: true
        # air-quality badge (lungs): outdoor AQI > 100. Colour = EPA band (orange / red / purple).
        # Fed by sensor.outdoor_aqi — Pirate Weather v2's airQualityIndex via a REST sensor;
        # the HA integration doesn't expose it and it only exists with `?version=2`.
        - label:
            id: aqi_note
            text: "\U000F1084"
            text_font: mdi_note
            align: CENTER
            y: 72
            text_color: 0xFF9F43
            hidden: true
    - id: thermostat_page
      on_load:
        - lambda: 'id(current_page) = 1;'
      widgets:
        - image:
            id: thermo_bg
            src: tm_cool
            align: CENTER
            # native 300px, centered (no zoom — see bg_main note)
        # delta ring: the span between CURRENT and TARGET, coloured by mode. At setpoint the
        # ring is EMPTY — calm means nothing to do, working means a visible gap closing. Dial
        # maps 60–80°F onto 135°→405° (gap at the bottom clears the −/fan/+ hints).
        - arc:
            id: therm_ring
            align: CENTER
            width: 325
            height: 325
            start_angle: 135
            end_angle: 45
            arc_width: 8
            arc_color: 0x2A3038
            arc_opa: 50%
            adjustable: false
            indicator:
              arc_color: 0xFF9F43
            knob:
              bg_opa: TRANSP
        # white tick = CURRENT temp. Same trick as the timer cover: an arc's BACKGROUND is a
        # freely-positionable segment, so a ~4° bg drawn wider than the track reads as a tick
        # straddling it.
        - arc:
