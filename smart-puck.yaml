    # ── MEDIA screen (3) — display only; the bottom tap-zones do vol−/play-pause/vol+ ──
    - id: media_page
      on_load:
        - lambda: 'id(current_page) = 2;'
      widgets:
        # album art fills the screen (falls back to the glow when idle) — set at runtime
        - image:
            id: media_bg
            src: music_idle
            align: CENTER
        # full-screen shade: dims the album art so title/artist read clearly over any cover
        - obj:
            align: CENTER
            width: 360
            height: 360
            radius: 0
            border_width: 0
            bg_color: 0x000000
            bg_opa: 58%
        # track progress — the annulus is this device's language: forecast (main), countdown
        # (timer), setpoint (thermostat), and here: position in the song. Fed by
        # sensor.smart_puck_track_progress (HA computes %, ~4x/min; smooth enough at 5px).
        - arc:
            id: media_ring
            align: CENTER
            width: 352
            height: 352
            start_angle: 270
            end_angle: 269
            arc_width: 5
            arc_color: 0x2A3038
            arc_opa: 45%
            adjustable: false
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              arc_color: 0x7FE9FF
            knob:
              bg_opa: TRANSP
        - label:
            id: media_title_label
            text: "Office"
            text_font: roboto_media
            align: CENTER
            y: -18
            width: 320
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR
            text_color: 0xFFFFFF
        - label:
            id: media_artist_label
            text: ""
            text_font: roboto_media
            align: CENTER
            y: 20
            width: 300
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR
            text_color: 0xC2CDDE
        # bottom-zone hints: vol−(F075E)  ·  play/pause (dynamic)  ·  vol+(F075D)
        - label:
            text: "\U000F075E"
            text_font: mdi_btn
            align: CENTER
            x: -88
            y: 82
            text_color: 0x9AA6BB
        - label:
            id: media_action_icon
            text: "\U000F040A"
            text_font: mdi_btn
            align: CENTER
            x: 0
            y: 82
            text_color: 0x9AA6BB
        - label:
            text: "\U000F075D"
            text_font: mdi_btn
            align: CENTER
            x: 88
            y: 82
            text_color: 0x9AA6BB
    # ── VOICE view (Okay Nabu): neural bg + phase tint + spinner + transcript/reply; tap anywhere = stop ──
    - id: doorbell_page
      skip: true          # modal — seized on a bell press, never in the tap cycle
      widgets:
        # FULL-BLEED (v2, the user ): the display is PHYSICALLY round, so filling the screen
        # makes the glass itself the porthole — no radius/clip_corner software circle. v1 drew a
        # 240px inset circle and my lv_image_set_offset_x pan overran the image data, leaving a
        # straight-cut right edge. The container clips its child; the 640x360 frame sits at
        # x=-140 so the CENTRE 360px band shows ((640-360)/2). Costs a bigger decode
        # (~48KB vs ~23KB -> ~1s one-shot loop block at ring time, measured 509ms at 23KB).
        - obj:
            align: CENTER
            width: 360
            height: 360
            radius: 0
            border_width: 0
            pad_all: 0
            bg_color: 0x000000
            bg_opa: COVER
            scrollable: false
            widgets:
              - image:
                  id: db_img
                  src: doorbell_snap
                  x: -140
                  y: 0
              - label:
                  id: db_icon
                  text: "\U000F12E6"
                  text_font: mdi_modal
                  align: CENTER
                  y: -20
                  text_color: 0x7FE9FF
                  hidden: true
              # overlay strip: legibility scrim, not a panel — the photo stays the hero
              - obj:
                  align: BOTTOM_MID
                  y: 0
                  width: 360
                  height: 92
                  radius: 0
                  border_width: 0
                  pad_all: 0
                  bg_color: 0x000000
                  bg_opa: 55%
                  scrollable: false
              - label:
                  id: db_title
                  text: "Front door"
                  text_font: roboto_small
                  align: BOTTOM_MID
                  y: -62
                  text_color: 0xFFFFFF
              - label:
                  id: db_time
                  text: ""
                  text_font: roboto_small
                  align: BOTTOM_MID
                  y: -38
                  text_color: 0x9FE6FF
              - label:
                  text: "TAP TO DISMISS"
                  text_font: roboto_tiny
                  align: BOTTOM_MID
                  y: -16
                  text_color: 0xB9C6DA

    - id: alert_page
      skip: true
      widgets:
        # weather art layer — shown ONLY for weather-kind alerts (storm/rain/snow/haze), so the
        # modal is pretty when the sky is the message. Generic alerts (phone mirrors) keep the
        # plain dark look: arbitrary text shouldn't wear sky art.
        - image:
            id: al_bg
            src: wx_lightning
            align: CENTER
            hidden: true
        - obj:
            id: al_scrim
            align: CENTER
            width: 360
            height: 360
            radius: 0
            border_width: 0
            bg_color: 0x2A1206
            bg_opa: COVER
        - label:
            id: al_icon
            text: "\U000F0028"
            text_font: mdi_modal
            align: CENTER
            y: -96
            text_color: 0xFF9F43
        - label:
            id: al_wx_icon
            text: "\U000F0593"
            text_font: mdi_28
            align: CENTER
            y: -96
            text_color: 0xFFFFFF
            hidden: true
        - label:
            id: al_title
            text: ""
            text_font: roboto_label
            align: CENTER
            y: -28
            width: 300
            text_align: CENTER
            long_mode: WRAP
            text_color: 0xFFFFFF
        - label:
            id: al_msg
            text: ""
            text_font: roboto_small
            align: CENTER
            y: 46
            width: 310
            text_align: CENTER
            long_mode: WRAP
            text_color: 0xE4EAF4
        - label:
            text: "TAP TO DISMISS"
            text_font: roboto_tiny
            align: BOTTOM_MID
            y: -14
            text_color: 0x9AA6BB

    - id: voice_page
      skip: true          # modal — shown only during a voice interaction, not in the top-half tap cycle
      widgets:
