# CST816 touch. TP_RST = PCA9554 EXIO0 (confirmed: pulsing it at boot makes the chip read CST816T
# instead of "Unknown"); display LCD_RST = EXIO2, so the two no longer fight. The cst816 component
# owns NO reset_pin (our on_boot switch owns EXIO0). POLLING mode (update_interval, NO interrupt_pin):
# the board's INT pin is unverified (its pin map already diverged on TP_RST) and USB serial streaming
# stalls, so we poll the chip on a timer and publish a touch counter to HA for reliable observation.
touchscreen:
  - platform: cst816
    id: my_touchscreen
    i2c_id: main_i2c
    update_interval: 50ms
    skip_probe: true
    display: main_display
    # ORIENTATION — set from 2-corner calibration (chip raw coords vs what the user sees). Identity until then.
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    # BIG-ZONE tap model (coords are display-space after `transform:` above): top half cycles screens;
    # bottom half is split L/M/R and acts on whichever screen is showing. One action per tap (on_release).
    on_touch:
      - lambda: |-
          id(touch_start_x) = touch.x; id(touch_start_y) = touch.y;
          id(touch_count) += 1;
          id(touch_count_sensor).publish_state(id(touch_count));
          // ROTATION COMPENSATION (lvgl rotation: 180). LVGL rotates touch coords for ITS OWN
          // widgets, but this lambda is a touchscreen callback — it runs BEFORE/outside LVGL and
          // still sees unrotated chip coords. So map raw -> visual here: visual = 359 - raw.
          // Do NOT "fix" this by adding mirror_x/mirror_y to the touchscreen `transform:` — that
          // feeds LVGL too, and LVGL would rotate on top of it, double-flipping any interactive
          // LVGL widget. Compensating locally keeps LVGL's own coordinate space correct.
          int x = 359 - touch.x, y = 359 - touch.y, z;
          if (y < 180) z = 0;             // top half -> cycle
          else if (x < 120) z = 1;        // bottom-left  -> decrease
          else if (x < 240) z = 2;        // bottom-mid   -> stop/start
          else z = 3;                     // bottom-right -> increase
          id(tap_zone) = z;
          id(touch_debug).publish_state(str_sprintf("(%d,%d) z=%d", x, y, z));
    on_release:
      - if:   # AN OPEN MODAL (doorbell/alert) -> any tap dismisses it (and consumes the tap)
          condition: {lambda: 'return id(modal_open) != 0;'}
          then:
            - script.stop: doorbell_show   # kill the pending auto-close or it fires later
            - script.stop: alert_show      #   and yanks the user off a page he navigated to himself
            - script.stop: weather_alert_show
            - script.execute: modal_hide
            - lambda: 'id(tap_zone) = -1;'
      - if:   # A FIRED TIMER -> any tap dismisses it (and consumes the tap)
          condition: {lambda: 'return id(timer_done);'}
          then:
            - script.stop: timer_finished_show
            - script.execute: timer_hide
            - lambda: 'id(tap_zone) = -1;'
      - if:   # VOICE ACTIVE -> any tap cancels it (and consumes the tap so it doesn't also navigate)
          condition: {lambda: 'return id(va_active);'}
          then:
            - script.stop: va_watchdog   # cancel first — else it fires later on a dead interaction
            - script.execute: unduck_music
            - voice_assistant.stop:
            - lambda: 'id(va_active) = false; id(tap_zone) = -1;'
            - script.execute: return_to_prev_page
            - micro_wake_word.start:
      - if:   # TOP HALF -> next screen
          condition: {lambda: 'return id(tap_zone) == 0;'}
          then:
            - lvgl.page.next: {animation: MOVE_LEFT, time: 120ms}
      # ── THERMOSTAT screen: - / fan-toggle / + ──
      - if:
          condition:
            and:
              - lambda: 'return id(tap_zone) == 1;'
              - lvgl.page.is_showing: thermostat_page
          then: [{script.execute: {id: adjust_thermostat, delta: -1.0}}]
      - if:
          condition:
            and:
              - lambda: 'return id(tap_zone) == 3;'
              - lvgl.page.is_showing: thermostat_page
          then: [{script.execute: {id: adjust_thermostat, delta: 1.0}}]
      - if:
          condition:
            and:
              - lambda: 'return id(tap_zone) == 2;'
              - lvgl.page.is_showing: thermostat_page
          then:
            # optimistic: flip fan_on + recolor the icon INSTANTLY, then send the command; the HA
            # fan_mode sensor confirms/corrects the color when the thermostat actually reports back.
            - lambda: 'id(fan_on) = !id(fan_on);'
            - if:
                condition: {lambda: 'return id(fan_on);'}
                then: [{lvgl.label.update: {id: fan_hint_icon, text_color: 0x4FA8FF}}]
                else: [{lvgl.label.update: {id: fan_hint_icon, text_color: 0x9AA6BB}}]
            - homeassistant.action:
                action: climate.set_fan_mode
                data:
                  entity_id: "${climate_entity}"
                  fan_mode: !lambda 'return id(fan_on) ? std::string("on") : std::string("off");'
      # ── MEDIA screen: vol- / play-pause / vol+ ──
      - if:
          condition:
            and:
              - lambda: 'return id(tap_zone) == 1;'
              - lvgl.page.is_showing: media_page
          then:
            - homeassistant.action: {action: media_player.volume_down, data: {entity_id: "${media_player_native}"}}
      - if:
          condition:
            and:
              - lambda: 'return id(tap_zone) == 3;'
              - lvgl.page.is_showing: media_page
          then:
            - homeassistant.action: {action: media_player.volume_up, data: {entity_id: "${media_player_native}"}}
      - if:
          condition:
            and:
              - lambda: 'return id(tap_zone) == 2;'
              - lvgl.page.is_showing: media_page
          then:
            - homeassistant.action: {action: media_player.media_play_pause, data: {entity_id: "${media_player_native}"}}
      # ── CLOCK screen: bottom-middle also toggles play/pause (taps the now-playing line) ──
      - if:
          condition:
            and:
              - lambda: 'return id(tap_zone) == 2;'
              - lvgl.page.is_showing: main_page
          then:
            - homeassistant.action: {action: media_player.media_play_pause, data: {entity_id: "${media_player_native}"}}

globals:
  - id: ui_target          # on-device working target (NAN = follow HA); optimistic +/- feel
    type: float
    restore_value: no
    initial_value: "NAN"
  - id: touch_start_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_start_y
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_last_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_last_y
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: touch_count       # cumulative touches, published to HA so I can verify touch fires without serial
    type: int
    restore_value: no
    initial_value: "0"
  - id: tap_zone          # last tap's zone: 0=top(cycle) 1=bottom-left 2=bottom-mid 3=bottom-right
    type: int
    restore_value: no
    initial_value: "0"
  - id: fan_on            # mirrors ${climate_entity} fan_mode=="on" (for the toggle + icon)
    type: bool
    restore_value: no
    initial_value: "false"
  - id: va_active         # true while a voice interaction is in progress (tap anywhere to cancel it)
    type: bool
    restore_value: no
    initial_value: "false"
  - id: current_page      # 0=clock 1=thermostat 2=media — set by each page's on_load, so the modal
    type: int             # voice_page can return you to WHERE YOU WERE instead of always the clock.
    restore_value: no     # voice_page deliberately does NOT set it (it's skip:true and transient).
    initial_value: "0"
  - id: timer_done       # a timer has FIRED and is showing DONE — next tap dismisses it
    type: bool
    restore_value: no
    initial_value: "false"
  - id: modal_open       # 0 none | 1 doorbell | 2 alert. An open modal OWNS the next tap
    type: int             # (dismiss) and must not also navigate -- same contract as timer_done.
    restore_value: no
    initial_value: "0"
  - id: spk_vol           # voice-reply volume step (BOOT long-press cycles 0.4/0.7/1.0).
    type: float             # Persisted: your volume choice should survive a reboot.
    restore_value: yes
    initial_value: "0.7"
  - id: camera_title      # what the porthole scrim says — set by whichever HA action fired it
    type: std::string
    restore_value: no
    initial_value: '"Front door"'
  - id: rain_warned       # edge-trigger latch: alert once when precip ENTERS the next 2h, not
    type: bool            # every 10min while it keeps raining; resets when the window dries out
    restore_value: no
    initial_value: "false"
  - id: pre_duck_vol      # Office Sonos volume before ducking, so restore is EXACT, not a guess.
    type: float
    restore_value: no
    initial_value: "0.44"
  - id: is_ducked         # guards restore: only un-duck if we actually ducked
    type: bool
    restore_value: no
    initial_value: "false"

script:
  # ── WEATHER-STYLED ALERT ────────────────────────────────────────────────────────────────
  # Same modal, dressed for the message: the existing weather backgrounds + the matching
  # condition glyph, behind a light scrim. kind: storm | pouring | rain | snow | haze.
  - id: weather_alert_show
    mode: restart
    parameters:
      kind: string
      title: string
      message: string
    then:
      - script.execute: {id: alert_show, title: !lambda 'return title;', message: !lambda 'return message;'}
      - if:
          condition: {lambda: 'return kind == "storm";'}
          then: [{lvgl.image.update: {id: al_bg, src: wx_lightning}}, {lvgl.label.update: {id: al_wx_icon, text: "\U000F0593"}}]
      - if:
          condition: {lambda: 'return kind == "pouring";'}
          then: [{lvgl.image.update: {id: al_bg, src: wx_pouring}}, {lvgl.label.update: {id: al_wx_icon, text: "\U000F0596"}}]
      - if:
          condition: {lambda: 'return kind == "rain";'}
          then: [{lvgl.image.update: {id: al_bg, src: wx_rainy}}, {lvgl.label.update: {id: al_wx_icon, text: "\U000F0597"}}]
      - if:
          condition: {lambda: 'return kind == "snow";'}
          then: [{lvgl.image.update: {id: al_bg, src: wx_snowy}}, {lvgl.label.update: {id: al_wx_icon, text: "\U000F0598"}}]
      - if:
          condition: {lambda: 'return kind == "haze";'}
          then: [{lvgl.image.update: {id: al_bg, src: wx_fog}}, {lvgl.label.update: {id: al_wx_icon, text: "\U000F0591"}}]
      - lvgl.widget.show: al_bg
      - lvgl.widget.hide: al_icon
      - lvgl.widget.show: al_wx_icon
      - lvgl.widget.update: {id: al_scrim, bg_color: 0x0B0E13, bg_opa: 45%}

  # ── THERMOSTAT DELTA RING ───────────────────────────────────────────────────────────────
  - id: update_therm_ring
    mode: single
    then:
      - lambda: |-
          // v3 (the user's model, ): the FILL's leading edge is the ROOM (current), the
          // white TICK is the GOAL (target), and the fill is anchored at the end the
          // temperature is COMING FROM — heat rises from the cold/left end clockwise, cooling
          // descends from the hot/right end counter-clockwise, each sweeping toward the tick
          // until edge touches tick (= at setpoint, calm). Direction of travel tells you
          // heating-vs-cooling before you read a number. (v2 anchored left always and tick'd
          // CURRENT — the user read the tick as target anyway, and his reading was better.)
          float cur = id(therm_current).state;
          float tgt = isnan(id(ui_target)) ? id(therm_target).state : id(ui_target);
          auto ang = [](float t) -> float {
            if (t < 60) t = 60;
            if (t > 80) t = 80;
            return 135.0f + (t - 60.0f) * 13.5f;           // 60–80°F -> 135°–405° dial
          };
          std::string mode = id(climate_mode).state;
          bool cool_style = (mode == "cool") || (mode == "heat_cool" && !isnan(tgt) && cur > tgt);
          if (isnan(cur)) {
            lv_arc_set_angles(id(therm_ring), 135, 135);
          } else if (cool_style) {
            // fill = [current .. hot end], edge sweeps CCW toward the tick as the room cools
            lv_arc_set_angles(id(therm_ring), (int) ang(cur) % 360, 45);
          } else {
            // fill = [cold end .. current], edge sweeps CW toward the tick as the room heats
            // (end < start wraps through 0 in LVGL — exactly the dial's 360..405 tail)
            lv_arc_set_angles(id(therm_ring), 135, (int) ang(cur) % 360);
          }
          if (isnan(tgt)) {
            lv_obj_add_flag(id(therm_now_tick), LV_OBJ_FLAG_HIDDEN);
          } else {
            int a = (int) ang(tgt);
            lv_arc_set_bg_angles(id(therm_now_tick), (a - 2 + 360) % 360, (a + 2) % 360);
            lv_obj_clear_flag(id(therm_now_tick), LV_OBJ_FLAG_HIDDEN);
          }

  # ── BOOT BUTTON ACTIONS ─────────────────────────────────────────────────────────────────
  # Push-to-talk TOGGLE: click to talk (no wake word — immune to music/acoustics entirely),
  # click again to cancel. Mirrors the wake-word path exactly so every downstream handler
  # (ducking, watchdog, modal, re-arm) behaves identically to a spoken wake.
  - id: ptt_toggle
    mode: single
    then:
      - if:
          condition: {lambda: 'return id(va_active);'}
          then:
            - script.stop: va_watchdog
            - script.execute: unduck_music
            - voice_assistant.stop:
            - lambda: 'id(va_active) = false;'
            - script.execute: return_to_prev_page
            - micro_wake_word.start:
          else:
            - script.execute: duck_music
            - micro_wake_word.stop:
            - voice_assistant.start:

  # Hardware dismiss: clears whatever owns the screen. A physical escape hatch that works
  # even when the render loop is too busy to service a touchscreen tap.
  - id: hard_dismiss
    mode: single
    then:
      - script.stop: doorbell_show
      - script.stop: alert_show
      - script.stop: weather_alert_show
      - if:
          condition: {lambda: 'return id(modal_open) != 0;'}
          then: [{script.execute: modal_hide}]
      - if:
          condition: {lambda: 'return id(timer_done);'}
          then:
            - script.stop: timer_finished_show
            - script.execute: timer_hide

  # Voice-reply volume: 40% -> 70% -> 100% -> 40%, persisted, with an on-screen toast.
  - id: cycle_voice_volume
    mode: restart
    then:
      - lambda: |-
          float v = id(spk_vol);
          id(spk_vol) = (v < 0.55f) ? 0.7f : (v < 0.85f) ? 1.0f : 0.4f;
      - speaker.volume_set:
          id: i2s_speaker
          volume: !lambda 'return id(spk_vol);'
      - lvgl.label.update:
          id: vol_toast
          text: !lambda 'return str_sprintf("VOICE %.0f%%", id(spk_vol) * 100);'
      - lvgl.widget.show: vol_toast
      - delay: 1400ms
      - lvgl.widget.hide: vol_toast

  # ── DUCKING ─────────────────────────────────────────────────────────────────────────────
  # The music plays on the Office Sonos ACROSS THE ROOM, so the puck's mic hears Rihanna and
  # the user at once: wake-word detection degrades and Whisper mis-hears ("stop" heard
  # as "start" over music). AEC can't help — it cancels a device's OWN speaker, not another
  # box across the room. Ducking is the fix every commercial smart speaker uses: drop the
  # music the instant the wake word fires, restore on the way out.
  #
  # Restore MUST be reachable from EVERY exit path (on_end / on_error / watchdog / tap-to-stop)
  # or the music stays quiet forever — a far worse bug than the one being fixed. `is_ducked`
  # makes restore idempotent so calling it twice is harmless.
  - id: duck_music
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(media_state).state == "playing" && !id(is_ducked);'
          then:
            - lambda: |-
                id(pre_duck_vol) = id(sonos_volume).state;   // exact level, captured live
                id(is_ducked) = true;
                ESP_LOGI("duck", "ducking %.2f -> 0.12", id(pre_duck_vol));
            - homeassistant.service:
                service: media_player.volume_set
                data:
                  entity_id: "${media_player_ma}"
                data_template:
                  volume_level: "0.12"

  - id: unduck_music
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(is_ducked);'
          then:
            - homeassistant.service:
                service: media_player.volume_set
                data:
                  entity_id: "${media_player_ma}"
                variables:
                  vol: 'return id(pre_duck_vol);'
                data_template:
                  volume_level: "{{ vol }}"
            - lambda: |-
                ESP_LOGI("duck", "restored %.2f", id(pre_duck_vol));
                id(is_ducked) = false;

  # ── MODALS (doorbell / alert) ───────────────────────────────────────────────────────
  # Both are INTERRUPTIONS, not pages: skip:true so they stay out of the tap cycle, they seize
  # the screen from wherever you were, and they hand it back via return_to_prev_page. Auto-close
  # matters more than it looks -- a modal that needs a tap to clear turns a doorbell into a
  # screen that is stuck on a stranger's face until someone walks over.
  # Both badges share the y:72 slot under the date. One visible -> centred; both -> side by
  # side. lv_obj_align (not set_x) because the widgets are align:CENTER positioned.
  - id: layout_badges
    mode: single
    then:
      - lambda: |-
          // pack the visible badges around centre: 1 -> 0 | 2 -> ∓16 | 3 -> -28,0,28
          lv_obj_t *b[3] = {id(np_note), id(pkg_note), id(aqi_note)};
          int vis[3], n = 0;
          for (int i = 0; i < 3; i++)
            if (!lv_obj_has_flag(b[i], LV_OBJ_FLAG_HIDDEN)) vis[n++] = i;
          for (int k = 0; k < n; k++) {
            int x = (n == 1) ? 0 : (n == 2 ? (k == 0 ? -16 : 16) : (k - 1) * 28);
            lv_obj_align(b[vis[k]], LV_ALIGN_CENTER, x, 72);
          }

  - id: modal_hide
    mode: single
    then:
      - lambda: 'id(modal_open) = 0;'
      - script.execute: return_to_prev_page

  - id: doorbell_show
    mode: restart          # a second press re-arms the 45s window rather than stacking timers
    parameters:
      have_img: bool
    then:
      - lambda: 'id(modal_open) = 1;'
      - if:
          condition: {lambda: 'return have_img;'}
          then:
            - lvgl.widget.show: db_img
            - lvgl.widget.hide: db_icon
          else:
            - lvgl.widget.hide: db_img
            - lvgl.widget.show: db_icon
      - lvgl.label.update:
          id: db_title
          text: !lambda 'return id(camera_title);'
      - lvgl.label.update:
          id: db_time
          text: !lambda |-
            auto t = id(homeassistant_time).now();
            if (!t.is_valid()) return std::string("");
            // Hand-rolled, NOT strftime("%-I:..."): %-I (unpadded hour) is a glibc extension
            // that ESP-IDF's newlib rejects, and ESPHome's strftime wrapper renders its failure
            // as the literal string "ERROR" on the panel (shipped , the user saw it).
            int h = t.hour % 12; if (h == 0) h = 12;
            char buf[12];
            snprintf(buf, sizeof(buf), "%d:%02d %s", h, t.minute, t.hour < 12 ? "AM" : "PM");
            return std::string(buf);
      - lvgl.page.show: doorbell_page
      - delay: 45s
      - script.execute: modal_hide

  - id: alert_show
    mode: restart
    parameters:
      title: string
      message: string
    then:
      - lambda: 'id(modal_open) = 2;'
      # reset to the GENERIC look every time — weather_alert_show restyles on top of this,
      # and without the reset a plain phone alert would inherit the last storm's art
      - lvgl.widget.hide: al_bg
      - lvgl.widget.hide: al_wx_icon
      - lvgl.widget.show: al_icon
      - lvgl.widget.update: {id: al_scrim, bg_color: 0x2A1206, bg_opa: COVER}
      - lvgl.label.update: {id: al_title, text: !lambda 'return title;'}
      - lvgl.label.update: {id: al_msg,   text: !lambda 'return message;'}
      - lvgl.page.show: alert_page
      - delay: 60s
      - script.execute: modal_hide

  # ── TIMER ───────────────────────────────────────────────────────────────────────────────
  - id: timer_show
    mode: single
    then:
      - lambda: 'id(timer_done) = false;'
      - lvgl.widget.hide: weather_icon
      - lvgl.widget.hide: temp_out_text
      - lvgl.widget.hide: low_label
      - lvgl.label.update: {id: timer_label, text: "TIMER"}
      - lambda: 'lv_obj_set_style_arc_color(id(timer_cover), lv_color_hex(0x23282F), LV_PART_MAIN);'
      - lvgl.widget.show: timer_cover
      - lvgl.widget.show: timer_label
      - lvgl.widget.show: timer_value

  # Hide the cover and the forecast underneath is ALREADY correct — nothing to restore.
  # That's the whole point of masking instead of swapping.
  - id: timer_hide
    mode: single
    then:
      - lambda: 'id(timer_done) = false;'
      - lvgl.widget.hide: timer_cover
      - lvgl.widget.hide: timer_label
      - lvgl.widget.hide: timer_value
      - lvgl.widget.show: weather_icon
      - lvgl.widget.show: temp_out_text
      - lvgl.widget.show: low_label

  - id: timer_finished_show
    mode: restart
    then:
      - lambda: |-
          id(timer_done) = true;
          lv_arc_set_bg_angles(id(timer_cover), 270, 269);        // full circle
          lv_obj_set_style_arc_color(id(timer_cover), lv_color_hex(0xFF5A3C), LV_PART_MAIN);
      - lvgl.widget.show: timer_cover
      - lvgl.label.update: {id: timer_label, text: "TIMER"}
      - lvgl.label.update: {id: timer_value, text: "DONE"}
      - lvgl.widget.show: timer_label
      - lvgl.widget.show: timer_value
      - lvgl.page.show: main_page      # a fired timer is worth interrupting whatever page you're on
      - delay: 60s                     # self-clears if the user never taps
      - script.execute: timer_hide

  # VOICE WATCHDOG — the pipeline has NO timeout of its own. When no intent matches, HA hands the
  # phrase to your conversation agent, which can chew for ~50s+ (the "World Cup tailspin") while the
  # spinner sits there with no way out but a tap. This bounds it device-side.
  #
  # Scoped to the THINKING window on purpose: armed long at on_listening (backstop in case STT
  # itself never returns), re-armed short at on_stt_end (the actual tailspin window), and CANCELLED
  # at on_tts_start — once it's speaking, a long answer is legitimate and must not be killed.
  # mode: restart means each arm supersedes the previous.
  - id: va_watchdog
    mode: restart
    parameters:
      secs: int
    then:
      - delay: !lambda 'return secs * 1000;'
      - if:
          condition:
            lambda: 'return id(va_active);'
          then:
            - logger.log: "voice watchdog fired — aborting stuck pipeline"
            - script.execute: unduck_music
            - voice_assistant.stop:
            - lvgl.widget.hide: va_tint_blue
            - lvgl.widget.hide: va_tint_amber
            - lvgl.widget.show: va_tint_teal
            - lvgl.widget.update:
                id: va_spin
                indicator:
                  arc_color: 0xFF6B6B
            - lvgl.label.update: {id: va_reply, text: "Took too long — try again"}
            - lvgl.widget.hide: va_hint
            - delay: 2500ms
            - lambda: 'id(va_active) = false;'
            - script.execute: return_to_prev_page
            - micro_wake_word.start:

  # Return from the modal voice_page to whichever page the user was actually on (set by each page's
  # on_load). LVGL has no "go back" action and page.previous walks the cycle order, not history —
  # hence the explicit index. Used by on_end, on_error, and tap-to-stop.
  - id: return_to_prev_page
    then:
      - if:
          condition:
            lambda: 'return id(current_page) == 1;'
          then:
            - lvgl.page.show: {id: thermostat_page, animation: MOVE_RIGHT, time: 120ms}
          else:
            - if:
                condition:
                  lambda: 'return id(current_page) == 2;'
                then:
                  - lvgl.page.show: {id: media_page, animation: MOVE_RIGHT, time: 120ms}
                else:
                  - lvgl.page.show: {id: main_page, animation: MOVE_RIGHT, time: 120ms}

  - id: adjust_thermostat
    parameters:
      delta: float
    then:
      - lambda: |-
          float base = isnan(id(ui_target)) ? id(therm_target).state : id(ui_target);
          if (isnan(base)) return;
          float t = roundf(base + delta);
          if (t < 50) t = 50;
          if (t > 90) t = 90;
          id(ui_target) = t;
      - if:
          condition:
            lambda: 'return !isnan(id(ui_target));'
          then:
            - lvgl.label.update:
                id: therm_target_label
                text: !lambda 'return str_sprintf("%.0f°", id(ui_target));'
            - script.execute: update_therm_ring   # optimistic: ring tracks the tap instantly
            - homeassistant.action:
                action: climate.set_temperature
                data:
                  entity_id: "${climate_entity}"
                  temperature: !lambda 'return id(ui_target);'

# ── M2: live clock + date from the RTC ──
interval:
  # Insurance: keep re-disabling CST816 auto-sleep every 2s (harmless while awake; re-arms after any
  # chip reset/brownout). The boot write is primary; this catches edge cases so touch never goes sluggish.
  - interval: 2s
    then:
      - lambda: 'id(my_touchscreen).write_byte(0xFE, 0x01);'

  # WAKE-WORD SELF-HEAL + VISIBILITY. THE failure mode that matters on this device: every wake fires
  # micro_wake_word.stop, and re-arming lives in on_end/on_error/watchdog/tap-to-stop. If ANY path
  # ever misses (or an interaction dies in a way none of them catch), the puck goes permanently DEAF
  # with no visible symptom — the clock keeps ticking and you just think it stopped hearing you.
  # Arming is idempotent, so re-asserting it whenever it's off and no interaction is running is free.
  # Also publishes the state so HA can SEE deafness rather than waiting for the user to notice.
  - interval: 10s
    then:
      # also rescue a stuck duck: if no interaction is running but the music is still turned
      # down, some exit path missed unduck_music and the user is left with quiet music forever.
      - if:
          condition:
            lambda: 'return id(is_ducked) && !id(va_active);'
          then:
            - script.execute: unduck_music
      - if:
          condition:
            micro_wake_word.is_running:
          then:
            - binary_sensor.template.publish: {id: mww_armed, state: true}
          else:
            - binary_sensor.template.publish: {id: mww_armed, state: false}
            - if:
                condition:      # only re-arm when idle — mid-interaction it's SUPPOSED to be off
                  lambda: 'return !id(va_active);'
                then:
                  - logger.log: "wake-word self-heal: was idle but not armed — re-arming"
                  - micro_wake_word.start:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(rtc_time).now().is_valid();'
          then:
            - lvgl.label.update:
                id: time_label
                text: !lambda |-
                  std::string s = id(rtc_time).now().strftime("%I:%M %p");
                  if (!s.empty() && s[0] == '0') s.erase(0, 1);
                  return s;
            - lvgl.label.update:
                id: date_label
                text: !lambda |-
                  std::string s = id(rtc_time).now().strftime("%A, %b %e");
                  for (auto & c : s) c = toupper((unsigned char)c);
                  return s;

lvgl:
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  # 180° so the puck reads right-side-up when the USB-C cable exits AWAY from the viewer.
  # MUST be set HERE, not on the display, and the touchscreen transform MUST stay identity:
  # LVGL owns rotation and auto-rotates touch coords to match. Setting display `rotation:`
  # or adding touchscreen mirror_x/mirror_y on top would double-flip touch (picture right,
  # tap zones inverted). Uses the panel's hardware rotation if available, else software.
  rotation: 180
  color_depth: 16
  bg_color: 0x000000
  page_wrap: true
  # 25% buffer -> flushes in ~13ms quarters instead of one ~52ms full-frame push;
  # keeps the main loop responsive so the HA API connection stays up (else time/data starve).
  buffer_size: 25%
  top_layer:
    widgets:
      # volume toast — top layer so it overlays whichever page/modal is showing
      - label:
          id: vol_toast
          text: ""
          text_font: roboto_label
          align: CENTER
          y: 120
          text_color: 0xFFFFFF
          bg_color: 0x0B0E13
          bg_opa: 70%
          pad_all: 8
          radius: 8
          hidden: true
  pages:
    - id: main_page
      on_load:
        - lambda: 'id(current_page) = 0;'
      widgets:
