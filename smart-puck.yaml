display:
  - platform: mipi_spi        # migrated from deprecated qspi_dbi; maintained driver, better reset handling
    model: CUSTOM
    bus_mode: quad
    id: main_display
    spi_id: display_qspi
    data_rate: 40MHz
    invert_colors: true
    color_order: rgb
    dimensions:
      height: 360
      width: 360
    cs_pin: GPIO21
    reset_pin:
      # THE ONE REAL FIX: LCD_RST = PCA9554 EXIO2. Pin 1 is TP_RST (touch reset);
      # driving the wrong pin left the ST77916 un-reset -> intermittent static-on-boot
      # (the whole "fuzz" saga). With EXIO2 the panel resets reliably and the original
      # (correct-for-this-unit) init sequence renders clean + bright. Do NOT change to
      # the ulsmith/1.85C init or 80MHz — those are for a different unit and render dim
      # here. This unit is clean at: old init + 40MHz + default buffer + little_endian.
      pca9554: tca9554_dev
      number: 2
    auto_clear_enabled: false
