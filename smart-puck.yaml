# ── Album art: fetch the current track's cover from HA at runtime, show as the media background ──
http_request:
  timeout: 10s
  verify_ssl: false

online_image:
  - id: album_art
    url: "${ha_base_url}/"   # placeholder; real URL set at runtime from entity_picture
    format: JPEG
    type: RGB565
    resize: 360x360
    update_interval: never
    on_download_finished:
      - lvgl.image.update: {id: media_bg, src: album_art}
    on_error:
      - logger.log: "album art download failed"

  # ── Doorbell porthole frame ──────────────────────────────────────────────────────────
  # Frigate resizes SERVER-SIDE (`?height=240` -> 426x240, ~23KB). This is the whole reason the
  # porthole is safe: the alternative is decoding the native frame on the ESP32, and a blocking
  # decode is the prime suspect for the loop stall that garbled the panel. Keep the
  # resize upstream. `height` is the ONLY param Frigate 0.17 honours -- `h`/`w`/`size` are all
  # silently IGNORED and hand back the full frame, which looks identical until you check dims.
  - id: doorbell_snap
    url: "${frigate_base_url}/api/doorbell/latest.jpg?height=360"
    format: JPEG
    type: RGB565
    resize: 640x360
    update_interval: never       # fetched on demand when the bell rings, never polled
    on_download_finished:
      - lvgl.image.update: {id: db_img, src: doorbell_snap}
      - script.execute: {id: doorbell_show, have_img: true}
    on_error:
      - logger.log: "doorbell snapshot download FAILED - showing modal without a frame"
      # Deliberately do NOT fall back to the last good frame: online_image keeps the PREVIOUS
      # download in its buffer, so a stale frame would show the LAST visitor's face as if it
      # were the person at the door right now. A bell icon is honest; a wrong face is not.
      - script.execute: {id: doorbell_show, have_img: false}

