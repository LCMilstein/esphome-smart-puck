# Smart Puck v2 - Waveshare ESP32-S3-Touch-LCD-1.85C (V1 board)
# M1: substrate - display + touch + RTC + backlight + diagnostics + one LVGL page
# DEVICE NAME IS FROZEN (HA adoption depends on it). Do not rename.
substitutions:
  # ── EDIT THESE for your install ─────────────────────────────────────────────
  devicename: smart-puck
  friendly: "Smart Puck"
  ha_base_url: "http://homeassistant.local:8123"      # your HA URL (album art fetch)
  frigate_base_url: "http://homeassistant.local:5000" # your Frigate URL (camera portholes)
  media_player_native: media_player.living_room       # the Sonos/speaker this puck controls
  media_player_ma: media_player.living_room_ma        # its Music Assistant mirror (voice music)
  climate_entity: climate.thermostat                  # thermostat page
  occupancy_sensor: binary_sensor.living_room_occupancy  # dims the screen when room is empty
  weather_entity: weather.pirateweather               # main-page condition + outdoor temp

esphome:
  name: $devicename
  friendly_name: $friendly
  on_boot:
    # Wake the CST816 BEFORE the touch component sets up. The touch chip's IRQ_EN_MOTION register
    # (what makes INT fire) is written over I2C during touch setup at priority DATA(600); if TP_RST
    # is still asserted then, the chip doesn't ACK and that write silently fails → no touch. So at
    # priority 700 (>600, after pca9554@900 + tp_reset switch@800) we pulse TP_RST high. BLOCKING
    # delay() on purpose — the `- delay:` ACTION yields and would let touch set up mid-pulse.
    - priority: 700
      then:
        - lambda: |-
            ESP_LOGI("tp_reset", "pulsing TP_RST (EXIO%d) to wake CST816", 0);
            id(tp_reset).turn_off();  // TP_RST LOW  = assert reset
            delay(10);
            id(tp_reset).turn_on();   // TP_RST HIGH = release reset
            delay(50);                // CST816 boot-settle before touch setup writes IRQ_EN_MOTION
            ESP_LOGI("tp_reset", "TP_RST released");
    # After touch setup (600) — while the chip is still awake (~1s in, before its ~2s auto-sleep) —
    # disable auto-sleep so it stays responsive. Register 0xFE = DisAutoSleep on the CST816; without
    # this the chip naps after 2s idle and the first tap only wakes it (unreported) → sluggish/dead touch.
    - priority: 100
      then:
        - lambda: |-
            bool ok = id(my_touchscreen).write_byte(0xFE, 0x01);
            ESP_LOGI("cst816", "DisAutoSleep(0xFE) write %s", ok ? "OK" : "FAILED");
    - priority: 600
      then:
        - pcf85063.read_time
    - priority: -100
      then:
        - light.turn_on:
            id: backlight
            brightness: 80%
        - lvgl.page.show: main_page   # always boot to the clock face (page 0), keeps cycle order predictable

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    # PERF (-O2) over the SIZE default: the user wanted snappier paints after the ring grew to the
    # bezel (loop 43->50ms). LVGL's software renderer is exactly the hot loop -O2 helps.
    # Cost is binary size only -- we sit at 59% of a 7.75MB slot, so headroom is the point of
    # having it. Revert = delete these two lines.
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
  # No `partitions:` override — the 6MB `model` partition was an esp_sr leftover from the vendor
  # firmware and nothing referenced it (subtype: undefined). micro_wake_word compiles its model
  # into the app binary. Dropping it lets ESPHome size the two OTA slots to fill the 16MB flash.
  # Changing this table requires a WIRED flash — OTA only writes the app slot, not the table at 0x8000.

psram:
  mode: octal
  speed: 80MHz

logger:
  baud_rate: 0        # all-OTA now: no physical UART, logs stream via the HA API connection
  level: INFO

debug:
  update_interval: 30s

api:
  reboot_timeout: 4h
  encryption:
    key: !secret api_key
  # Sync backlight to current office occupancy on (re)connect — covers the "rebooted while the room
  # was empty" case, since a binary_sensor's INITIAL imported state doesn't re-fire on_state.
  on_client_connected:
    - delay: 4s
    - if:
        condition: {lambda: 'return id(office_occupancy).state;'}
        then: [{light.turn_on: {id: backlight, brightness: 80%, transition_length: 800ms}}]
        else: [{light.turn_on: {id: backlight, brightness: 12%, transition_length: 1500ms}}]
    - speaker.volume_set:
        id: i2s_speaker
        volume: !lambda 'return id(spk_vol);'
    - micro_wake_word.start   # arm "Okay Nabu" once HA (Assist pipeline) is reachable
  # HA-callable actions. The puck is the passive side: HA decides WHAT is worth interrupting for
  # (doorbell press, an actionable notification) and calls in. Keeps policy in HA where the user can
  # see and edit it, rather than compiled into firmware behind an OTA.
  actions:
    - action: show_doorbell
      then:
        - lambda: 'id(camera_title) = "Front door";'
        - online_image.set_url:
            id: doorbell_snap
            url: "${frigate_base_url}/api/doorbell/latest.jpg?height=360"
        - component.update: doorbell_snap   # download -> on_download_finished shows the modal
    # ANY Frigate camera, one firmware action. HA owns the policy of what deserves a porthole
    # (vehicle in driveway, person at the fence, ...) — new triggers are HA automations, not OTAs.
    - action: show_camera
      variables:
        camera: string
        title: string
      then:
        - lambda: 'id(camera_title) = title;'
        - online_image.set_url:
            id: doorbell_snap
            url: !lambda 'return "${frigate_base_url}/api/" + camera + "/latest.jpg?height=360";'
        - component.update: doorbell_snap
    - action: show_alert
      variables:
        title: string
        message: string
      then:
        - script.execute:
            id: alert_show
            title: !lambda 'return title;'
            message: !lambda 'return message;'
    - action: show_weather_alert
      variables:
        kind: string
        title: string
        message: string
      then:
        - script.execute:
            id: weather_alert_show
            kind: !lambda 'return kind;'
            title: !lambda 'return title;'
            message: !lambda 'return message;'

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 4h

i2c:
  id: main_i2c
  sda: GPIO11
  scl: GPIO10
  scan: false         # NOTE: CST816 touch @0x15 is ALIVE (worked from factory) but ESPHome can't wake it —
                      #   tried reset EXIO1 pulse / no-reset / EXIO1 hold-high, all "Failed to read chip ID".
                      #   Needs the vendor's exact wake sequence or correct TP_RST pin. Touch parked; display works.
  frequency: 400kHz

pca9554:
  - id: tca9554_dev
    i2c_id: main_i2c
    address: 0x20

time:
  - platform: pcf85063
    id: rtc_time
    i2c_id: main_i2c
    update_interval: never
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - pcf85063.write_time

output:
  - platform: ledc
    pin: GPIO5
    id: backlight_output

light:
  - platform: monochromatic
    name: "Backlight"
    id: backlight
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

sensor:
  # Touch counter — increments in on_touch, published to HA so I can confirm the CST816 is reporting
  # touches WITHOUT relying on the (stalling) USB serial stream. Watch the Touch Count sensor.
  - platform: template
    name: "Touch Count"
    id: touch_count_sensor
    accuracy_decimals: 0
    update_interval: never
  - platform: adc
    pin: GPIO8
    name: "Battery Voltage"
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 2.0
  - platform: internal_temperature
    name: "Chip Temp"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
    update_interval: 60s
  - platform: wifi_signal
    name: "WiFi RSSI"
    entity_category: diagnostic
    update_interval: 60s
  - platform: debug
    free:
      name: "Heap Free"
      entity_category: diagnostic
    min_free:
      name: "Heap Min Free"
      entity_category: diagnostic
    fragmentation:
      name: "Heap Fragmentation"
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      entity_category: diagnostic
    psram:
      name: "Free PSRAM"
      entity_category: diagnostic
  # ── M2: live data from Home Assistant ──
  # Office Sonos volume — read so ducking can restore the EXACT level, not a hardcoded guess.
  - platform: homeassistant
    id: sonos_volume
    entity_id: "${media_player_ma}"
    attribute: volume_level
  # NOTE: indoor temperature is no longer on the main page — it moved one tap away to the
  # thermostat screen, which frees the centre for the clock and the annulus for the ring.
  # (The thermostat page has its own `therm_current` feed; nothing here needs climate data.)
  - platform: homeassistant
    id: outdoor_temp
    entity_id: "${weather_entity}"
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: temp_out_text
          text: !lambda 'return str_sprintf("%.0f°", x);'
  # ── media: track position % -> the media page's outer progress ring ──
  - platform: homeassistant
    id: track_progress
    entity_id: sensor.smart_puck_track_progress
    on_value:
      - lvgl.arc.update:
          id: media_ring
          value: !lambda 'return (int) x;'
  # ── outdoor AQI -> haze badge visibility + EPA band colour ──
  - platform: homeassistant
    id: outdoor_aqi
    entity_id: sensor.outdoor_aqi
    on_value:
      - lambda: |-
          if (x > 100.0f) {
            uint32_t c = (x > 200.0f) ? 0xB06CE8 : (x > 150.0f) ? 0xFF5A3C : 0xFF9F43;
            lv_obj_set_style_text_color(id(aqi_note), lv_color_hex(c), LV_PART_MAIN);
            lv_obj_clear_flag(id(aqi_note), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(aqi_note), LV_OBJ_FLAG_HIDDEN);
          }
      - script.execute: layout_badges
  # ── thermostat: current temp -> "currently NN°" on the thermostat page ──
  - platform: homeassistant
    id: therm_current
    entity_id: "${climate_entity}"
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: therm_current_label
          text: !lambda 'return str_sprintf("CURRENTLY %.0f°", x);'
      - script.execute: update_therm_ring
  # ── thermostat: target temp -> big target label + seed the on-device working target ──
  - platform: homeassistant
    id: therm_target
    entity_id: "${climate_entity}"
    attribute: temperature
    on_value:
      - lambda: 'id(ui_target) = NAN;'
      - lvgl.label.update:
          id: therm_target_label
          text: !lambda 'return str_sprintf("%.0f°", x);'
      - script.execute: update_therm_ring

text_sensor:
  # Touch debug — published once per gesture (on_release) as "s(startX,startY) e(endX,endY) dx dy".
  # Lets me read actual touch coords + swipe delta over HA to see why nav doesn't fire, w/o serial.
  - platform: template
    name: "Touch Debug"
    id: touch_debug
    update_interval: never
  # ── thermostat fan mode -> fan_on global (for toggle) + fan icon show/hide ──
  - platform: homeassistant
    id: therm_fan_mode
    entity_id: "${climate_entity}"
    attribute: fan_mode
    on_value:
      - lambda: 'id(fan_on) = (x == std::string("on"));'
      # recolor the bottom fan control icon: blue when running, muted grey when off (no 2nd icon)
      - if:
          condition: {lambda: 'return id(fan_on);'}
          then: [{lvgl.label.update: {id: fan_hint_icon, text_color: 0x4FA8FF}}]
          else: [{lvgl.label.update: {id: fan_hint_icon, text_color: 0x9AA6BB}}]
  # ── HVAC mode (climate state) -> thermostat-screen background ──
  - platform: homeassistant
    id: climate_mode
    entity_id: "${climate_entity}"
    on_value:
      - if: {condition: {lambda: 'return x == "heat";'},      then: [{lvgl.image.update: {id: thermo_bg, src: tm_heat}}]}
      - if: {condition: {lambda: 'return x == "cool";'},      then: [{lvgl.image.update: {id: thermo_bg, src: tm_cool}}]}
      - if: {condition: {lambda: 'return x == "heat_cool";'}, then: [{lvgl.image.update: {id: thermo_bg, src: tm_heatcool}}]}
      - if: {condition: {lambda: 'return x == "off";'},       then: [{lvgl.image.update: {id: thermo_bg, src: tm_off}}]}
      - lambda: |-
          uint32_t c = 0x9AA6BB;                       // unknown/idle grey
          if (x == "heat") c = 0xFF9F43;
          else if (x == "cool") c = 0x6EC6FF;
          else if (x == "heat_cool") c = 0x5FD9C0;
          else if (x == "off") c = 0x555C66;
          lv_obj_set_style_arc_color(id(therm_ring), lv_color_hex(c), LV_PART_INDICATOR);
      - script.execute: update_therm_ring
  # ── media player: playing state -> media mid-icon + main-screen now-playing visibility ──
  - platform: homeassistant
    id: media_state
    entity_id: "${media_player_native}"
    on_value:
      - lvgl.label.update:
          id: media_action_icon
          text: !lambda 'return x == std::string("playing") ? std::string("\U000F03E4") : std::string("\U000F040A");'
      - if:   # main clock screen: a bare note = "something is playing". No title (unreadable at 13px).
          condition: {lambda: 'return x == std::string("playing");'}
          then: [{lvgl.widget.show: np_note}]
          else: [{lvgl.widget.hide: np_note}]
      - script.execute: layout_badges
      - if:   # media screen bg: keep album art while playing/paused, else revert to the glow
          condition: {lambda: 'return x != std::string("playing") && x != std::string("paused");'}
          then: [{lvgl.image.update: {id: media_bg, src: music_idle}}]
  - platform: homeassistant
    id: media_title
    entity_id: "${media_player_native}"
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: media_title_label
          text: !lambda 'return x.empty() ? std::string("Office") : x;'
  - platform: homeassistant
    id: media_artist
    entity_id: "${media_player_native}"
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: media_artist_label
          text: !lambda 'return x;'
  # ── FORECAST RING ──────────────────────────────────────────────────────────────────────
  # sensor.smart_puck_forecast_ring = 12 "temp:precip" pairs, hour 0 = NOW at 12 o'clock.
  #   "91:0,92:0,66:1,64:2,63:3,62:4,55:5,..."
  #   precip: 0 none | 1 light | 2 steady | 3 hard | 4 storm | 5 snow
  # Colour scales across THIS window's own min/max, not an absolute scale — so the ring always
  # uses its full dynamic range and a flat 5° day still reads as a gradient.
  - platform: homeassistant
    id: forecast_ring
    entity_id: sensor.smart_puck_forecast_ring
    on_value:
      - lambda: |-
          lv_obj_t *rings[12] = {id(ring_00), id(ring_01), id(ring_02), id(ring_03),
                                 id(ring_04), id(ring_05), id(ring_06), id(ring_07),
                                 id(ring_08), id(ring_09), id(ring_10), id(ring_11)};
          lv_obj_t *pxs[12]   = {id(px_00), id(px_01), id(px_02), id(px_03),
                                 id(px_04), id(px_05), id(px_06), id(px_07),
                                 id(px_08), id(px_09), id(px_10), id(px_11)};
          int temps[12], precs[12], n = 0;
          size_t pos = 0;
          while (n < 12 && pos <= x.size()) {
            size_t comma = x.find(',', pos);
            std::string tok = x.substr(pos, comma == std::string::npos ? std::string::npos
                                                                       : comma - pos);
            size_t colon = tok.find(':');
            if (colon == std::string::npos) break;
            temps[n] = atoi(tok.substr(0, colon).c_str());
            precs[n] = atoi(tok.substr(colon + 1).c_str());
            n++;
            if (comma == std::string::npos) break;
            pos = comma + 1;
          }
          if (n == 0) { ESP_LOGW("ring", "unparseable: %s", x.c_str()); return; }
          // ── RAIN INCOMING: alert once when precip ENTERS the next ~2h ─────────────────
          // Edge-triggered on the transition, latched by rain_warned, reset when dry — the
          // feed refreshes every 10min and MUST NOT re-alert while it keeps raining. The
          // boot guard seeds the latch silently: rebooting mid-storm is not news.
          {
            bool soon = (precs[0] > 0) || (n > 1 && precs[1] > 0);
            if (millis() < 120000) {
              id(rain_warned) = soon;
            } else if (soon && !id(rain_warned)) {
              id(rain_warned) = true;
              int pk = (precs[0] > 0) ? precs[0] : precs[1];
              const char *kind  = (pk == 4) ? "storm" : (pk == 5) ? "snow"
                                : (pk == 3) ? "pouring" : "rain";
              const char *what  = (pk == 4) ? "Storm incoming"
                                : (pk == 5) ? "Snow incoming" : "Rain incoming";
              id(weather_alert_show).execute(kind, what, "Within the next 2 hours");
            } else if (!soon) {
              id(rain_warned) = false;
            }
          }
          // ── ABSOLUTE °F → colour ────────────────────────────────────────────────────────
          // NOT relative to the window's own min/max. Relative was the first build and it LIES:
          // a January window of 35→19 painted 35° hot orange because it was the warmest hour,
          // i.e. the ring told you it was warm while you scraped the windshield. Colour has to
          // mean the same thing in July and January or it means nothing.
          // 32 gets its own stop on purpose — freezing is the temperature that changes what you
          // DO, so it should be a colour you can name. Cost: July rings are a narrow orange→
          // yellow band instead of a dramatic sweep. That's honest; July nights aren't cold.
          static const int TSTOP[8] = {0, 20, 32, 45, 58, 70, 82, 95};
          static const uint8_t CSTOP[8][3] = {
            {0x7A, 0x4F, 0xD4},   //  0  violet  brutal
            {0x3B, 0x7D, 0xD8},   // 20  deep blue
            {0x6E, 0xC6, 0xFF},   // 32  cyan    FREEZING
            {0x5F, 0xD9, 0xC0},   // 45  teal
            {0x8F, 0xD9, 0x6B},   // 58  green
            {0xF2, 0xD5, 0x44},   // 70  yellow
            {0xFF, 0x9F, 0x43},   // 82  orange
            {0xFF, 0x5A, 0x3C}};  // 95  red
          int lo = temps[0], hi = temps[0];
          for (int i = 0; i < n; i++) { if (temps[i] < lo) lo = temps[i];
                                        if (temps[i] > hi) hi = temps[i]; }
          for (int i = 0; i < 12; i++) {
            if (i >= n) {                       // short forecast: hide the unused tail
              lv_obj_add_flag(rings[i], LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text(pxs[i], "");
              continue;
            }
            lv_obj_clear_flag(rings[i], LV_OBJ_FLAG_HIDDEN);
            int tv = temps[i];   // NOT `t` — the precip block below already uses `const char *t`
            uint8_t r, g, b;
            if (tv <= TSTOP[0]) { r = CSTOP[0][0]; g = CSTOP[0][1]; b = CSTOP[0][2]; }
            else if (tv >= TSTOP[7]) { r = CSTOP[7][0]; g = CSTOP[7][1]; b = CSTOP[7][2]; }
            else {
              int k = 0;
              while (k < 6 && tv > TSTOP[k + 1]) k++;
              float f = (float)(tv - TSTOP[k]) / (float)(TSTOP[k + 1] - TSTOP[k]);
              r = (uint8_t)(CSTOP[k][0] + ((int)CSTOP[k+1][0] - (int)CSTOP[k][0]) * f);
              g = (uint8_t)(CSTOP[k][1] + ((int)CSTOP[k+1][1] - (int)CSTOP[k][1]) * f);
              b = (uint8_t)(CSTOP[k][2] + ((int)CSTOP[k+1][2] - (int)CSTOP[k][2]) * f);
            }
            lv_obj_set_style_arc_color(rings[i], lv_color_make(r, g, b), LV_PART_MAIN);
            const char *t = "";
            uint32_t col = 0x7FD4FF;
            switch (precs[i]) {
              case 1: t = "\U000F058C"; break;
              case 2: t = "\U000F058C\U000F058C"; break;
              case 3: t = "\U000F058C\U000F058C\U000F058C"; break;
              case 4: t = "\U000F140B"; col = 0xFFE066; break;
              case 5: t = "\U000F0717"; col = 0xDCF3FF; break;
              default: t = ""; break;
            }
            if (i == 0) t = "";   // hour 0 is already the big condition glyph — don't say it twice
            lv_label_set_text(pxs[i], t);
            lv_obj_set_style_text_color(pxs[i], lv_color_hex(col), LV_PART_MAIN);
          }
          ESP_LOGI("ring", "12h %d..%dF, %d slots", lo, hi, n);
  - platform: homeassistant
    id: forecast_low
    entity_id: sensor.smart_puck_forecast_ring
    attribute: low
    on_value:
      - lvgl.label.update:
          id: low_label
          text: !lambda 'return x.empty() ? std::string("") : ("LOW " + x + "°");'
  # album-art URL (HA proxy path w/ signed token) -> fetch the cover into online_image
  - platform: homeassistant
    id: media_art_url
    entity_id: "${media_player_native}"
    attribute: entity_picture
    on_value:
      - if:
          condition: {lambda: 'return !x.empty();'}
          then:
            - online_image.set_url:
                id: album_art
                url: !lambda 'return std::string("${ha_base_url}") + x;'
            - component.update: album_art
  - platform: version
    name: "Firmware Version"
    entity_category: diagnostic
    hide_timestamp: true
  - platform: wifi_info
    ip_address:
      name: "Device IP Address"
      entity_category: diagnostic
  - platform: debug
    reset_reason:
      name: "Reset Reason"
      entity_category: diagnostic
  # ── M2: weather condition -> icon + text ──
  - platform: homeassistant
    id: weather_condition
    entity_id: "${weather_entity}"
    on_value:
      - lvgl.label.update:
          id: weather_icon
          text: !lambda |-
            if (x == "sunny") return std::string("\U000F0599");
            if (x == "clear-night") return std::string("\U000F0594");
            if (x == "partlycloudy") return std::string("\U000F0595");
            if (x == "cloudy") return std::string("\U000F0590");
            if (x == "rainy") return std::string("\U000F0597");
            if (x == "pouring") return std::string("\U000F0596");
            if (x == "snowy") return std::string("\U000F0598");
            if (x == "fog") return std::string("\U000F0591");
            if (x == "lightning" || x == "lightning-rainy") return std::string("\U000F0593");
            if (x == "windy" || x == "windy-variant") return std::string("\U000F059D");
            if (x == "hail") return std::string("\U000F0592");
            return std::string("\U000F0590");
      # swap the clock-screen background to match the condition (src must be a compile-time image id)
      - if:
          condition: {lambda: 'return x == "sunny";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_sunny}}]
      - if:
          condition: {lambda: 'return x == "clear-night";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_clear_night}}]
      - if:
          condition: {lambda: 'return x == "partlycloudy";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_partlycloudy}}]
      - if:
          condition: {lambda: 'return x == "cloudy" || x == "exceptional";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_cloudy}}]
      - if:
          condition: {lambda: 'return x == "rainy";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_rainy}}]
      - if:
          condition: {lambda: 'return x == "pouring";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_pouring}}]
      - if:
          condition: {lambda: 'return x == "snowy" || x == "snowy-rainy";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_snowy}}]
      - if:
          condition: {lambda: 'return x == "fog";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_fog}}]
      - if:
          condition: {lambda: 'return x == "lightning" || x == "lightning-rainy";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_lightning}}]
      - if:
          condition: {lambda: 'return x == "windy" || x == "windy-variant";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_windy}}]
      - if:
          condition: {lambda: 'return x == "hail";'}
          then: [{lvgl.image.update: {id: bg_main, src: wx_hail}}]

binary_sensor:
  - platform: status
    name: "Status"
    entity_category: diagnostic
  # Is the puck actually LISTENING? Published every 30s by the self-heal interval. Without this,
  # "went deaf" is invisible — the screen looks perfectly healthy either way. Alert on this being
  # off for >2min in HA if this ever becomes a device the user depends on.
  - platform: template
    id: mww_armed
    name: "Wake Word Armed"
    entity_category: diagnostic
    icon: mdi:ear-hearing
  # Night behavior: no ambient-light sensor on this board, so drive the backlight from office
  # occupancy — full brightness when someone's there, dim when the room's empty (saves the panel,
  # no 2am glare). Fades so it's not jarring.
  # ── BOOT side button (GPIO0) — the button FURTHEST from USB-C, nearest the user.
  # (the user verified empirically 07-17: the USB-C-side button is RESET = hard reboot.)
  # GPIO0 is the strapping/download pin, but as a momentary INPUT at runtime this is the
  # vendor-intended dual use. click = push-to-talk toggle | double = dismiss | long = volume.
  - platform: gpio
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
      ignore_strapping_warning: true
    on_multi_click:
      - timing:
          - ON for at most 400ms
          - OFF for at least 330ms
        then:
          - script.execute: ptt_toggle
      - timing:
          - ON for at most 400ms
          - OFF for at most 300ms
          - ON for at most 400ms
          - OFF for at least 200ms
        then:
          - script.execute: hard_dismiss
      - timing:
          - ON for at least 700ms
        then:
          - script.execute: cycle_voice_volume
  - platform: homeassistant
    id: package_waiting
    entity_id: input_boolean.package_waiting
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then: [{lvgl.widget.show: pkg_note}]
          else: [{lvgl.widget.hide: pkg_note}]
      - script.execute: layout_badges
  - platform: homeassistant
    id: office_occupancy
    entity_id: "${occupancy_sensor}"
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then:
            - light.turn_on: {id: backlight, brightness: 80%, transition_length: 800ms}
          else:
            - light.turn_on: {id: backlight, brightness: 12%, transition_length: 1500ms}

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO40
  data_pins: [GPIO46, GPIO45, GPIO42, GPIO41]

switch:
  - platform: gpio
    pin: GPIO18
    id: lcd_te
    internal: true
  # TP_RST (touch reset) = PCA9554 EXIO1 (active-low). SINGLE OWNER of this pin — the cst816 component
  # must NOT declare reset_pin (its post-init write on EXIO1 races the display's EXIO2 reset and blanks
  # the ST77916). ALWAYS_OFF holds reset asserted (LOW) at switch setup(800); on_boot@700 pulses it high
  # to wake the chip before the touch component's setup(600) writes IRQ_EN_MOTION.
  - platform: gpio
    id: tp_reset
    internal: true
    pin: {pca9554: tca9554_dev, number: 0}   # EXIO1 pulse didn't wake the chip; trying EXIO0 (research's other TP_RST candidate)
    restore_mode: ALWAYS_OFF

# ─── VOICE: "Okay Nabu" wake word → HA Assist pipeline. Audio pins from the working v17 firmware. ───
i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin: GPIO38
    i2s_bclk_pin: GPIO48
  - id: i2s_in
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO15

speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO47
    dac_type: external
    channel: stereo

microphone:
  - platform: i2s_audio
    id: i2s_microphone
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO39
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000

micro_wake_word:
  id: mww
  models:
    - model: hey_jarvis
  on_wake_word_detected:
    - script.execute: duck_music # drop the Sonos BEFORE listening — the mic is across the room from it
    - micro_wake_word.stop:      # stop listening for the wake word while the assistant runs (frees audio/CPU)
    - voice_assistant.start:

voice_assistant:
  id: va
  microphone: i2s_microphone
  speaker: i2s_speaker
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  # PHASE COLOR = tint overlay + matching spinner indicator, so the orb itself reads the phase
  # rather than only the wash behind it. cyan=listening, amber=thinking, teal=speaking.
  on_listening:
    - lambda: 'id(va_active) = true;'
    - lvgl.widget.show: va_tint_blue
    - lvgl.widget.hide: va_tint_amber
    - lvgl.widget.hide: va_tint_teal
    - lvgl.widget.hide: va_hint
    - lvgl.widget.update:
        id: va_spin
        indicator:
          arc_color: 0x7FE9FF
    - lvgl.label.update: {id: va_prompt, text: "Listening…"}
    - lvgl.label.update: {id: va_reply, text: ""}
    - lvgl.page.show: voice_page
    - script.execute:            # long backstop: covers a wedged mic/STT that never reaches on_stt_end
        id: va_watchdog
        secs: 45
  on_stt_end:        # amber → thinking; show what it heard
    - lvgl.label.update: {id: va_prompt, text: !lambda 'return x.empty() ? std::string("…") : x;'}
    - lvgl.widget.hide: va_tint_blue
    - lvgl.widget.show: va_tint_amber
    - lvgl.widget.update:
        id: va_spin
        indicator:
          arc_color: 0xFFC24D
    - script.execute:            # THE tailspin window: intent/LLM budget. Re-arms (mode: restart).
        id: va_watchdog
        secs: 20
  on_tts_start:      # teal → speaking; show the reply + tap-to-stop hint
    - script.stop: va_watchdog   # it answered — a long reply is legitimate, don't kill it
    - lvgl.label.update: {id: va_reply, text: !lambda 'return x;'}
    - lvgl.widget.hide: va_tint_amber
    - lvgl.widget.show: va_tint_teal
    - lvgl.widget.show: va_hint
    - lvgl.widget.update:
        id: va_spin
        indicator:
          arc_color: 0x5FF2E4
  on_timer_started:
    - script.execute: timer_show
  on_timer_updated:
    - script.execute: timer_show
  on_timer_cancelled:
    - script.execute: timer_hide
  on_timer_finished:
    - script.execute: timer_finished_show
  on_timer_tick:
    - lambda: |-
        // Drive the cover from the SOONEST active timer. Fields verified against the ESPHome
        // API docs: total_seconds / seconds_left / is_active.
        uint32_t left = 0, total = 0;
        bool found = false;
        for (auto &t : timers) {
          if (!t.is_active) continue;
          if (!found || t.seconds_left < left) { left = t.seconds_left; total = t.total_seconds; found = true; }
        }
        if (!found) return;                     // cancelled/finished handle their own teardown
        float frac = (total > 0) ? (float) left / (float) total : 0.0f;
        if (frac < 0.0f) frac = 0.0f;
        if (frac > 1.0f) frac = 1.0f;
        // Cover spans the REMAINING fraction, anchored at 12 o'clock; it peels clockwise.
        // NOTE: bg_angles, not set_angles — set_angles moves the INDICATOR, and the colour
        // lives on LV_PART_MAIN (the background arc), same as the forecast segments.
        float elapsed_deg = (1.0f - frac) * 360.0f;
        if (elapsed_deg < 0.5f) elapsed_deg = 0.5f;   // start == end is degenerate in LVGL
        int start = ((int) (270.0f + elapsed_deg)) % 360;
        lv_arc_set_bg_angles(id(timer_cover), start, 270);
        char buf[16];
        if (left >= 3600) snprintf(buf, sizeof(buf), "%u:%02u:%02u", left / 3600, (left % 3600) / 60, left % 60);
        else              snprintf(buf, sizeof(buf), "%u:%02u", left / 60, left % 60);
        lv_label_set_text(id(timer_value), buf);
  on_end:
    - script.stop: va_watchdog
    - script.execute: unduck_music
    # 400ms before re-arming: the puck was caught IDLE-but-DEAF for 24s and only the
    # self-heal recovered it. Best hypothesis — mww.start was called the instant the assistant
    # ended, while TTS audio was still releasing the mic, and silently failed. The self-heal is
    # the backstop; this is the actual fix attempt.
    - delay: 400ms
    - micro_wake_word.start:
    - delay: 2600ms
    - lambda: 'id(va_active) = false;'
    - script.execute: return_to_prev_page
  on_error:
    - script.stop: va_watchdog
    - script.execute: unduck_music
    - micro_wake_word.start:
    - lvgl.label.update: {id: va_reply, text: "Sorry — try again"}
    - lvgl.widget.hide: va_tint_blue
    - lvgl.widget.hide: va_tint_amber
    - lvgl.widget.show: va_tint_teal
    - lvgl.widget.update:
        id: va_spin
        indicator:
          arc_color: 0xFF6B6B     # red — the one phase that isn't a normal transition
    - delay: 2500ms
    - lambda: 'id(va_active) = false;'
    - script.execute: return_to_prev_page

